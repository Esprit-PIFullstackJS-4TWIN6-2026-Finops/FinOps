services:
  jenkins:
    build:
      context: ./jenkins
    image: multitenant-jenkins-ci
    container_name: multitenant-jenkins
    restart: unless-stopped
    user: "0:0"
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci

  sonarqube:
    image: sonarqube:lts-community
    container_name: multitenant-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - ci

networks:
  ci:
    name: multitenant-ci

volumes:
  jenkins_home:
    external: true
    name: jenkins_home
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
