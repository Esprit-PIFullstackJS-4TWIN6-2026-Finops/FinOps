sonar.projectKey=finops-saas-platform
sonar.projectName=FinOps SaaS Platform
sonar.projectVersion=1.0

sonar.sources=backend/src,frontend
sonar.tests=backend/src,frontend

sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx

sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx
