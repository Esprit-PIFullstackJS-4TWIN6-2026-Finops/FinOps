version: "3.9"
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: saas_dashboard
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      PORT: 4000
      CLIENT_URL: http://localhost:8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: saas_dashboard
      JWT_SECRET: change_me_access
      JWT_REFRESH_SECRET: change_me_refresh
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      - mysql
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:

