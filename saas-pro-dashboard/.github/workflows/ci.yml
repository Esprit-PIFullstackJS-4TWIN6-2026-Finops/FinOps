name: SaaS Dashboard CI

on:
  push:
    paths:
      - "saas-pro-dashboard/**"
  pull_request:
    paths:
      - "saas-pro-dashboard/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-pro-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            saas-pro-dashboard/frontend/package-lock.json
            saas-pro-dashboard/backend/package-lock.json

      - name: Install backend deps
        run: |
          cd backend
          npm install
          npm run check

      - name: Install frontend deps
        run: |
          cd frontend
          npm install
          npm run build

